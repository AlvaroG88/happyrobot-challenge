<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HappyRobot - Carrier Sales Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #f5f5f5;
            color: #1a1a1a;
            padding: 24px;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 600;
        }
        .header span {
            color: #666;
            font-size: 14px;
        }
        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 32px;
        }
        .kpi-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #e5e5e5;
        }
        .kpi-card .label {
            font-size: 13px;
            color: #666;
            margin-bottom: 4px;
        }
        .kpi-card .value {
            font-size: 28px;
            font-weight: 700;
        }
        .kpi-card .subtext {
            font-size: 12px;
            color: #999;
            margin-top: 4px;
        }
        .charts-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(400px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }
        .chart-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e5e5e5;
        }
        .chart-card h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .chart-container {
            position: relative;
            height: 260px;
        }
        .calls-table {
            background: white;
            border-radius: 12px;
            padding: 24px;
            border: 1px solid #e5e5e5;
        }
        .calls-table h3 {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            text-align: left;
            padding: 10px 12px;
            border-bottom: 2px solid #e5e5e5;
            color: #666;
            font-weight: 500;
            font-size: 13px;
        }
        td {
            padding: 10px 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 500;
        }
        .badge-accepted { background: #dcfce7; color: #166534; }
        .badge-rejected { background: #fee2e2; color: #991b1b; }
        .badge-no_loads { background: #f3f4f6; color: #374151; }
        .badge-carrier_not_eligible { background: #fef3c7; color: #92400e; }
        .badge-max_negotiations_reached { background: #ede9fe; color: #5b21b6; }
        .badge-positive { background: #dcfce7; color: #166534; }
        .badge-neutral { background: #f3f4f6; color: #374151; }
        .badge-negative { background: #fee2e2; color: #991b1b; }
        .loading {
            text-align: center;
            padding: 40px;
            color: #999;
        }
        .refresh-btn {
            padding: 8px 16px;
            background: #1a1a1a;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 13px;
        }
        .refresh-btn:hover { background: #333; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Carrier Sales Dashboard</h1>
        <div>
            <span id="last-updated"></span>
            <button class="refresh-btn" onclick="loadDashboard()">Refresh</button>
        </div>
    </div>

    <div class="kpi-grid">
        <div class="kpi-card">
            <div class="label">Total calls</div>
            <div class="value" id="total-calls">-</div>
        </div>
        <div class="kpi-card">
            <div class="label">Acceptance rate</div>
            <div class="value" id="acceptance-rate">-</div>
            <div class="subtext" id="accepted-detail"></div>
        </div>
        <div class="kpi-card">
            <div class="label">Avg negotiation rounds</div>
            <div class="value" id="avg-rounds">-</div>
            <div class="subtext">Max 3 rounds</div>
        </div>
        <div class="kpi-card">
            <div class="label">Avg discount given</div>
            <div class="value" id="avg-discount">-</div>
            <div class="subtext">From loadboard rate</div>
        </div>
    </div>

    <div class="charts-grid">
        <div class="chart-card">
            <h3>Call outcomes</h3>
            <div class="chart-container">
                <canvas id="outcome-chart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>Carrier sentiment</h3>
            <div class="chart-container">
                <canvas id="sentiment-chart"></canvas>
            </div>
        </div>
        <div class="chart-card">
            <h3>Calls over time</h3>
            <div class="chart-container">
                <canvas id="timeline-chart"></canvas>
            </div>
        </div>
    </div>

    <div class="calls-table">
        <h3>Recent calls</h3>
        <table>
            <thead>
                <tr>
                    <th>Carrier</th>
                    <th>MC #</th>
                    <th>Load</th>
                    <th>Initial rate</th>
                    <th>Final rate</th>
                    <th>Rounds</th>
                    <th>Outcome</th>
                    <th>Sentiment</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="calls-body">
                <tr><td colspan="9" class="loading">Loading...</td></tr>
            </tbody>
        </table>
    </div>

    <script>
        const API_URL = window.location.origin;
        const API_KEY = 'hr-dev-key-2024';

        const OUTCOME_COLORS = {
            accepted: '#22c55e',
            rejected: '#ef4444',
            no_loads: '#9ca3af',
            carrier_not_eligible: '#f59e0b',
            max_negotiations_reached: '#8b5cf6'
        };

        const SENTIMENT_COLORS = {
            positive: '#22c55e',
            neutral: '#9ca3af',
            negative: '#ef4444'
        };

        let outcomeChart, sentimentChart, timelineChart;

        async function fetchData(endpoint) {
            const res = await fetch(`${API_URL}${endpoint}`, {
                headers: { 'X-API-Key': API_KEY }
            });
            return res.json();
        }

        function formatOutcome(outcome) {
            return outcome.replace(/_/g, ' ').replace(/\b\w/g, c => c.toUpperCase());
        }

        async function loadDashboard() {
            try {
                const [metrics, calls] = await Promise.all([
                    fetchData('/api/metrics/'),
                    fetchData('/api/calls/')
                ]);

                // KPIs
                document.getElementById('total-calls').textContent = metrics.total_calls;
                document.getElementById('acceptance-rate').textContent = metrics.acceptance_rate + '%';
                document.getElementById('accepted-detail').textContent =
                    `${metrics.accepted_calls} accepted / ${metrics.rejected_calls} rejected`;
                document.getElementById('avg-rounds').textContent = metrics.avg_negotiation_rounds;
                document.getElementById('avg-discount').textContent = metrics.avg_discount_percent + '%';
                document.getElementById('last-updated').textContent =
                    'Updated ' + new Date().toLocaleTimeString();

                // Outcome chart
                const outcomeLabels = Object.keys(metrics.outcome_breakdown).filter(k => k !== 'string');
                const outcomeValues = outcomeLabels.map(k => metrics.outcome_breakdown[k]);
                const outcomeColors = outcomeLabels.map(k => OUTCOME_COLORS[k] || '#ccc');

                if (outcomeChart) outcomeChart.destroy();
                outcomeChart = new Chart(document.getElementById('outcome-chart'), {
                    type: 'doughnut',
                    data: {
                        labels: outcomeLabels.map(formatOutcome),
                        datasets: [{
                            data: outcomeValues,
                            backgroundColor: outcomeColors,
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'right', labels: { padding: 16, font: { size: 13 } } }
                        }
                    }
                });

                // Sentiment chart
                const sentLabels = Object.keys(metrics.sentiment_breakdown).filter(k => k !== 'string');
                const sentValues = sentLabels.map(k => metrics.sentiment_breakdown[k]);
                const sentColors = sentLabels.map(k => SENTIMENT_COLORS[k] || '#ccc');

                if (sentimentChart) sentimentChart.destroy();
                sentimentChart = new Chart(document.getElementById('sentiment-chart'), {
                    type: 'doughnut',
                    data: {
                        labels: sentLabels.map(s => s.charAt(0).toUpperCase() + s.slice(1)),
                        datasets: [{
                            data: sentValues,
                            backgroundColor: sentColors,
                            borderWidth: 0
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: {
                            legend: { position: 'right', labels: { padding: 16, font: { size: 13 } } }
                        }
                    }
                });

                // Timeline chart
                const timeLabels = metrics.calls_over_time.map(d => d.date.slice(5));
                const timeCounts = metrics.calls_over_time.map(d => d.count);

                if (timelineChart) timelineChart.destroy();
                timelineChart = new Chart(document.getElementById('timeline-chart'), {
                    type: 'bar',
                    data: {
                        labels: timeLabels,
                        datasets: [{
                            label: 'Calls',
                            data: timeCounts,
                            backgroundColor: '#3b82f6',
                            borderRadius: 6
                        }]
                    },
                    options: {
                        responsive: true,
                        maintainAspectRatio: false,
                        plugins: { legend: { display: false } },
                        scales: {
                            y: { beginAtZero: true, ticks: { stepSize: 1 } },
                            x: { grid: { display: false } }
                        }
                    }
                });

                // Calls table
                const tbody = document.getElementById('calls-body');
                tbody.innerHTML = calls.slice(0, 20).map(c => `
                    <tr>
                        <td>${c.carrier_name || '-'}</td>
                        <td>${c.mc_number}</td>
                        <td>${c.load_id || '-'}</td>
                        <td>${c.initial_rate ? '$' + c.initial_rate.toFixed(0) : '-'}</td>
                        <td>${c.final_rate ? '$' + c.final_rate.toFixed(0) : '-'}</td>
                        <td>${c.negotiation_rounds}</td>
                        <td><span class="badge badge-${c.outcome}">${formatOutcome(c.outcome || '-')}</span></td>
                        <td><span class="badge badge-${c.sentiment}">${c.sentiment ? c.sentiment.charAt(0).toUpperCase() + c.sentiment.slice(1) : '-'}</span></td>
                        <td>${new Date(c.created_at).toLocaleDateString()}</td>
                    </tr>
                `).join('');

            } catch (err) {
                console.error('Dashboard error:', err);
            }
        }

        loadDashboard();
        setInterval(loadDashboard, 30000);
    </script>
</body>
</html>
